[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "web"
startCommand = "npm run start"

[[services]]
name = "scheduler"
startCommand = "node dist/scheduler/index.js"
